<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Creative Dark Calendar 2026</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Dark Gradient Background */
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
}

/* Title */
.main-title {
    text-align: center;
    color: #00ffff;
    font-size: 2.7rem;
    font-weight: bold;
    margin: 30px 0;
    text-shadow: 0 0 10px #00ffff;
}

/* Month Card */
.month-card {
    background: #1b1f27;
    border-radius: 18px;
    padding: 12px;
    margin-bottom: 25px;

    /* Neon Glow */
    box-shadow:
        0 0 10px #00ffff33,
        0 0 20px #00ffff22,
        inset 0 0 10px #000000;

    transition: 0.3s;
}

/* Glow Hover */
.month-card:hover {
    transform: scale(1.02);
    box-shadow:
        0 0 20px #00ffff66,
        0 0 30px #00ffff44;
}

/* Month Title */
.month-title {
    text-align: center;
    font-weight: bold;
    font-size: 1.3rem;
    margin-bottom: 8px;
    color: #00ffff;
}

/* Table Header */
.calendar-table th {
    background-color: #111827;
    color: #00ffff;
    text-align: center;
    font-size: 13px;
}

/* Table Cells */
.calendar-table td {
    height: 45px;
    text-align: center;
    vertical-align: top;
    font-weight: 500;
    color: #e5e7eb;
    border-color: #374151;
}

/* Date Hover */
.calendar-table td:hover {
    background-color: #00ffff22;
    cursor: pointer;
}

/* Grid spacing */
.row {
    margin-bottom: 10px;
}

</style>

</head>

<body>

<div class="container">

<h1 class="main-title">🌙 Calendar 2026</h1>

<div class="row" id="calendar"></div>

</div>

<script>

const months = [
"January 2026","February 2026","March 2026",
"April 2026","May 2026","June 2026",
"July 2026","August 2026","September 2026",
"October 2026","November 2026","December 2026"
];

const daysOfWeek = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function generateCalendar(year) {

let calendarHTML = "";

for (let month = 0; month < 12; month++) {

let firstDay = new Date(year, month, 1).getDay();
let daysInMonth = new Date(year, month + 1, 0).getDate();

calendarHTML += `
<div class="col-md-4 col-sm-6">

<div class="month-card">

<div class="month-title">${months[month]}</div>

<table class="table table-bordered calendar-table">

<thead>
<tr>
${daysOfWeek.map(day => `<th>${day}</th>`).join("")}
</tr>
</thead>

<tbody>
`;

let date = 1;

for (let i = 0; i < 6; i++) {

calendarHTML += "<tr>";

for (let j = 0; j < 7; j++) {

if (i === 0 && j < firstDay) {

calendarHTML += "<td></td>";

}
else if (date > daysInMonth) {

calendarHTML += "<td></td>";

}
else {

calendarHTML += `<td>${date}</td>`;
date++;

}

}

calendarHTML += "</tr>";

if (date > daysInMonth) break;

}

calendarHTML += `
</tbody>
</table>

</div>

</div>
`;

}

document.getElementById("calendar").innerHTML = calendarHTML;

}

generateCalendar(2026);

</script>

</body>
</html>
